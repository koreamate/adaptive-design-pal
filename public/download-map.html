<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>지도 HTML 다운로드</title>
<style>
  body { font-family: 'Noto Sans KR', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f8f9fa; }
  .card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 400px; }
  h2 { margin: 0 0 12px; font-size: 20px; color: #1e293b; }
  p { color: #64748b; font-size: 14px; margin: 0 0 24px; }
  button { background: hsl(178, 60%, 52%); color: #fff; border: none; padding: 14px 32px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
  button:hover { transform: scale(1.03); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .progress { margin-top: 16px; color: #64748b; font-size: 13px; }
</style>
</head>
<body>
<div class="card">
  <h2>🗺️ 대한민국 지도 HTML</h2>
  <p>시도·시군구·읍면동 3단계 드릴다운 지도를<br>단일 HTML 파일로 다운로드합니다.</p>
  <button id="dlBtn" onclick="generateAndDownload()">다운로드</button>
  <div class="progress" id="status"></div>
</div>
<script>
async function generateAndDownload() {
  const btn = document.getElementById("dlBtn");
  const status = document.getElementById("status");
  btn.disabled = true;
  status.textContent = "데이터 로딩 중...";

  try {
    const [muniRes, subRes] = await Promise.all([
      fetch("/data/korea-municipalities-topo.json"),
      fetch("/data/korea-submunicipalities-topo.json")
    ]);
    status.textContent = "JSON 파싱 중...";
    const muniText = await muniRes.text();
    const subText = await subRes.text();

    status.textContent = "HTML 생성 중...";

    const html = buildHTML(muniText, subText);

    status.textContent = "다운로드 준비...";
    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "korea-map.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    status.textContent = "✅ 다운로드 완료!";
  } catch (e) {
    status.textContent = "❌ 오류: " + e.message;
  }
  btn.disabled = false;
}
